<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Gym Tools</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #d6d6d6;
      --btn-bg: #111;
      --btn-border: #333;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-right: max(14px, env(safe-area-inset-right));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      --safe-left: max(14px, env(safe-area-inset-left));
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    body { position: relative; user-select: none; }
    .menu-btn {
      position: absolute;
      top: var(--safe-top);
      right: var(--safe-right);
      min-width: 86px;
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid var(--btn-border);
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--fg);
      font: inherit;
      font-size: clamp(16px, 1.8vw, 20px);
      cursor: pointer;
      z-index: 10;
    }
    .clock-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(var(--safe-top) + 48px) 24px calc(var(--safe-bottom) + 24px);
    }
    .time {
      font-size: clamp(92px, 26vw, 260px);
      line-height: 0.9;
      letter-spacing: -0.05em;
      font-weight: 700;
      margin: 0;
    }
    .date {
      font-size: clamp(30px, 6.5vw, 72px);
      line-height: 1.1;
      color: var(--muted);
      margin-top: 18px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <button class="menu-btn" onclick="window.location.href='menu.html'">Menu</button>
  <main class="clock-wrap">
    <div id="time" class="time">12:00</div>
    <div id="date" class="date">Mon 27 Mar</div>
  </main>
  <script>
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', {
        hour: '2-digit',
        minute: '2-digit',
        second: undefined,
        hour12: false
      });
      const date = now.toLocaleDateString('en-GB', {
        weekday: 'short',
        day: 'numeric',
        month: 'short'
      });
      document.getElementById('time').textContent = time;
      document.getElementById('date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
