<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rest Timer – GymTools</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <a class="back-link" href="../menu.html">← Back</a>
      <h1>Rest Timer</h1>
      <button class="secondary-btn" id="themeToggle" type="button">Toggle Theme</button>
    </div>

    <div class="layout">
      <div id="builderPanelWrap">
        <div class="panel">
          <div class="panel-header">
            <strong>Workout Builder</strong>
          </div>

          <div class="block-form">
            <div class="field" style="margin-bottom: 12px;">
              <span>Workout name</span>
              <input id="workoutName" type="text" placeholder="Workout A" maxlength="60" />
            </div>

            <form id="blockForm">
              <div class="form-grid">
                <div class="field">
                  <span>Mode</span>

                  <div class="mode-buttons" id="modeButtons">
                    <button type="button" class="mode-btn active" id="modeQuickRest">Quick Rest</button>
                    <button type="button" class="mode-btn" id="modeSets">Sets</button>
                    <button type="button" class="mode-btn" id="modeSetCounter">Set Counter</button>
                  </div>

                  <select id="blockType" class="hidden" aria-hidden="true" tabindex="-1">
                    <option value="quick_rest">Quick Rest</option>
                    <option value="sets">Sets</option>
                    <option value="set_counter">Set Counter</option>
                  </select>
                </div>

                <div class="field" id="roundsFieldWrap">
                  <span id="roundsLabel">Number of sets</span>
                  <div class="stepper" data-target="blockRounds" data-step="1" data-min="1" data-max="20">
                    <button class="stepper-btn" type="button" data-stepper-action="decrement" aria-label="Decrease number of sets">−</button>
                    <input id="blockRounds" type="text" value="3" inputmode="none" readonly aria-label="Number of sets" />
                    <button class="stepper-btn" type="button" data-stepper-action="increment" aria-label="Increase number of sets">+</button>
                  </div>
                </div>

                <div class="field">
                  <span>Rest (seconds)</span>
                  <div class="stepper" data-target="blockRest" data-step="5" data-min="0" data-max="900">
                    <button class="stepper-btn" type="button" data-stepper-action="decrement" aria-label="Decrease rest time">−</button>
                    <input id="blockRest" type="text" value="60" inputmode="none" readonly aria-label="Rest time in seconds" />
                    <button class="stepper-btn" type="button" data-stepper-action="increment" aria-label="Increase rest time">+</button>
                  </div>
                </div>
              </div>
<div class="form-actions" style="margin-top: 12px;">
                <button class="primary-btn" id="addBlockBtn" type="submit">Add Block</button>
                <button class="secondary-btn" id="resetBuilderBtn" type="button">Clear Workout</button>
              </div>

              <div class="field clock-field">
                <span>Time</span>
                <div id="gymClock" class="gym-clock">00:00</div>
              </div>
            </form>
          </div>
        </div>

        <div class="panel" id="currentBlocksPanel" style="margin-top: 16px;">
          <div class="panel-header">
            <strong>Current Blocks</strong>
          </div>
          <div class="block-list" id="blockList"></div>
        </div>
      </div>

      <div>
        <div class="panel" id="timerPanelWrap">
          <div class="panel-header">
            <strong id="currentWorkoutTitle">Workout A</strong>
          </div>

          <div class="status-card">
            <div class="status-row">
              <div class="status-label">Current block</div>
              <div id="currentBlockLabel">Not started</div>
            </div>
            <div class="status-row">
              <div class="status-label">Progress</div>
              <div id="currentProgressLabel">—</div>
            </div>
            <div class="status-row">
              <div class="status-label">Current step</div>
              <div id="currentStepLabel">—</div>
            </div>
          </div>

          <div class="timer-card idle" id="timerCard">
            <div class="timer-phase" id="timerPhase">Ready</div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-subtext" id="timerSubtext">Build your workout, then press Start.</div>
          </div>

          <div class="complete-banner hidden" id="workoutComplete">Workout complete.</div>

          <div class="control-row" style="margin-bottom: 10px;">
            <button class="primary-btn" id="startWorkoutBtn" type="button">Start</button>
            <button class="secondary-btn" id="resetFlowBtn" type="button">Reset</button>
            <button class="secondary-btn" id="saveWorkoutBtn" type="button">Save Workout</button>
          </div>
        </div>

        <div class="panel hidden" id="setCounterPanel">
          <div class="panel-header">
            <strong>Set Counter</strong>
          </div>

          <div class="set-counter-card">
            <div class="set-counter-label">Current Set</div>
            <div class="set-counter-number" id="setCounterNumber">1</div>
          </div>

          <div class="set-counter-actions">
            <button class="primary-btn set-counter-next" id="setCounterNextBtn" type="button">Next Set</button>
          </div>

          <div class="set-counter-secondary-actions">
            <button class="secondary-btn" id="setCounterResetBtn" type="button">Reset</button>
            <button class="secondary-btn" id="setCounterExitBtn" type="button">Exit</button>
          </div>
        </div>

        <div class="panel saved-section" id="savedWorkoutsPanel" style="margin-top: 16px;">
          <div class="saved-header">
            <strong>Saved Workouts</strong>
          </div>
          <div class="saved-workouts" id="savedWorkouts"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
