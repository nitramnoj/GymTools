<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kettlebell HIIT Selector</title>

<style>
:root {
  color-scheme: light dark;
  --page-bg: #ffffff;
  --text-color: #111111;
  --muted-text: #444444;
  --panel-bg: #ffffff;
  --border-color: #cccccc;
  --button-bg: #f3f3f3;
  --button-text: #111111;
}

html.dark {
  --page-bg: #0f1115;
  --text-color: #f3f5f8;
  --muted-text: #a9b1bf;
  --panel-bg: #171a21;
  --border-color: #2f3747;
  --button-bg: #1d2230;
  --button-text: #f3f5f8;
}

html, body {
  background: var(--page-bg);
  color: var(--text-color);
}

body {
  font-family: Arial, sans-serif;
  max-width: 760px;
  margin: 0 auto;
  padding: 88px 16px 120px;
  line-height: 1.4;
  position: relative;
  min-height: 100vh;
  box-sizing: border-box;
}

h2 { margin: 0 0 16px; }
.row { margin: 0 0 14px; }

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
}

select, input, button {
  font-size: 16px;
  padding: 8px;
  background: var(--button-bg);
  color: var(--button-text);
  border: 1px solid var(--border-color);
}

select, input[type="number"] {
  width: 100%;
  max-width: 360px;
  background: var(--panel-bg);
  color: var(--text-color);
}

.buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 8px;
}

button { cursor: pointer; }

pre {
  white-space: pre-wrap;
  border: 1px solid var(--border-color);
  background: var(--panel-bg);
  padding: 12px;
  min-height: 180px;
  margin-top: 18px;
  font-size: 18px;
}

.hidden { display: none; }

.nav-bar {
  position: fixed;
  top: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
  pointer-events: none;
}

.gymtools-link,
.back-btn {
  font-size: 14px;
  padding: 10px 14px;
  background: var(--button-bg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  pointer-events: auto;
  color: var(--button-text);
  text-decoration: none;
}

.utility-clock {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 10000;
  font-size: clamp(44px, 5vw, 58px);
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--muted-text);
  background: var(--page-bg);
  padding: 6px 10px 6px 0;
  pointer-events: none;
}

#fullScreenView {
  position: fixed;
  inset: 0;
  background: var(--page-bg);
  z-index: 9999;
  padding: 16px 16px 120px;
  overflow: auto;
}

#fullScreenOutput {
  font-size: 28px;
  line-height: 1.5;
  margin-top: 16px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
</style>
</head>

<body>

<div id="selectorView">
  <div class="nav-bar">
    <a class="gymtools-link" href="../menu.html">Back</a>
    <button class="back-btn" id="themeToggle">Theme</button>
  </div>

  <h2>Kettlebell HIIT Selector</h2>

  <div class="row">
    <label>Movement</label>
    <select id="movement">
      <option value="mixed">Mixed</option>
      <option value="hinge">Hinge</option>
      <option value="squat">Squat</option>
      <option value="combo">Combination</option>
    </select>
  </div>

  <div class="row">
    <label>Load</label>
    <select id="load">
      <option value="single">Single</option>
      <option value="double">Double</option>
      <option value="mixed">Mixed</option>
    </select>
  </div>

  <div class="row">
    <label>Intervals</label>
    <input type="number" id="count" value="6" min="1">
  </div>

  <div class="buttons">
    <button id="generateBtn">Generate</button>
    <button id="fullScreenBtn">Full Screen</button>
  </div>

  <pre id="output">Press Generate</pre>
</div>

<div id="fullScreenView" class="hidden">
  <div class="topbar">
    <button id="backBtn" class="back-btn">Back</button>
    <button class="back-btn" id="themeToggleFull">Theme</button>
  </div>
  <pre id="fullScreenOutput"></pre>
  <div id="fullScreenClock" class="utility-clock">00:00</div>
</div>

<div id="utilityClock" class="utility-clock">00:00</div>

<script>
const output = document.getElementById('output');
const full = document.getElementById('fullScreenOutput');
const selector = document.getElementById('selectorView');
const fullscreen = document.getElementById('fullScreenView');

let allExercises = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function normaliseMovement(value) {
  if (value === 'combination') return 'combo';
  return value;
}

function parseExercises(text) {
  const lines = text.split(/\r?\n/);
  const parsed = [];
  let currentSection = '';

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    if (line.startsWith('#')) {
      currentSection = line.replace('#', '').trim().toLowerCase();
      continue;
    }

    const parts = line.split('|').map(part => part.trim());
    if (parts.length < 2 || !currentSection) continue;

    const [load, movement] = currentSection.split('_');
    const name = parts[0];
    const tag = parts[1];
    const isSingleSide = parts[2]?.toLowerCase() === 'single';

    parsed.push({
      name,
      tag,
      load,
      movement: normaliseMovement(movement),
      sideMode: isSingleSide ? 'single' : 'normal',
      slots: isSingleSide ? 2 : 1
    });
  }

  return parsed;
}

async function loadExercises() {
  const response = await fetch('exercises.txt', { cache: 'no-store' });
  if (!response.ok) {
    throw new Error('Could not load exercises.txt');
  }
  const text = await response.text();
  allExercises = parseExercises(text);
}

function getPool(movementValue, loadValue) {
  return allExercises.filter(exercise => {
    const movementMatch = movementValue === 'mixed' || exercise.movement === movementValue;
    const loadMatch = loadValue === 'mixed' || exercise.load === loadValue;
    return movementMatch && loadMatch;
  });
}

function expandExercise(exercise) {
  if (exercise.sideMode === 'single') {
    return [`${exercise.name} Right`, `${exercise.name} Left`];
  }
  return [exercise.name];
}

function buildExactSelection(pool, targetSlots) {
  if (!pool.length) return null;

  for (let attempt = 0; attempt < 500; attempt++) {
    const remaining = shuffle(pool);
    const chosen = [];
    let slotsUsed = 0;

    while (remaining.length && slotsUsed < targetSlots) {
      const possible = remaining.filter(item => item.slots <= (targetSlots - slotsUsed));
      if (!possible.length) break;

      const picked = possible[Math.floor(Math.random() * possible.length)];
      chosen.push(picked);
      slotsUsed += picked.slots;

      const index = remaining.indexOf(picked);
      if (index >= 0) {
        remaining.splice(index, 1);
      }
    }

    if (slotsUsed === targetSlots) {
      return chosen;
    }
  }

  return null;
}

function formatSelection(selection) {
  const lines = [];
  let intervalNumber = 1;

  for (const exercise of selection) {
    for (const line of expandExercise(exercise)) {
      lines.push(`${intervalNumber}. ${line}`);
      intervalNumber += 1;
    }
  }

  return lines.join('\n');
}

function showMessage(text) {
  output.textContent = text;
  full.textContent = text;
}

async function generateWorkout() {
  const movement = document.getElementById('movement').value;
  const load = document.getElementById('load').value;
  const count = Number(document.getElementById('count').value);

  if (!Number.isInteger(count) || count < 1) {
    showMessage('Please enter a valid interval number.');
    return;
  }

  if (!allExercises.length) {
    try {
      await loadExercises();
    } catch (error) {
      showMessage('Could not load exercises.txt');
      return;
    }
  }

  const pool = getPool(movement, load);

  if (!pool.length) {
    showMessage('No exercises found for that selection.');
    return;
  }

  const selection = buildExactSelection(pool, count);

  if (!selection) {
    showMessage('Could not build that exact interval total with the available exercises. Try a different number or broaden the filter.');
    return;
  }

  showMessage(formatSelection(selection));
}

document.getElementById('generateBtn').onclick = generateWorkout;

document.getElementById('fullScreenBtn').onclick = () => {
  full.textContent = output.textContent;
  selector.classList.add('hidden');
  fullscreen.classList.remove('hidden');
};

document.getElementById('backBtn').onclick = () => {
  fullscreen.classList.add('hidden');
  selector.classList.remove('hidden');
};

function updateClock() {
  const now = new Date();
  const timeText =
    now.getHours().toString().padStart(2, '0') + ':' +
    now.getMinutes().toString().padStart(2, '0');

  document.getElementById('utilityClock').textContent = timeText;

  const fullScreenClock = document.getElementById('fullScreenClock');
  if (fullScreenClock) {
    fullScreenClock.textContent = timeText;
  }
}

setInterval(updateClock, 1000);
updateClock();

const key = 'gymTheme';

function applyTheme() {
  document.documentElement.classList.toggle(
    'dark',
    localStorage.getItem(key) !== 'light'
  );
}

function toggleTheme() {
  localStorage.setItem(
    key,
    localStorage.getItem(key) === 'light' ? 'dark' : 'light'
  );
  applyTheme();
}

document.getElementById('themeToggle').onclick = toggleTheme;
document.getElementById('themeToggleFull').onclick = toggleTheme;

applyTheme();
loadExercises().catch(() => {
  showMessage('Could not load exercises.txt');
});
</script>

</body>
</html>
