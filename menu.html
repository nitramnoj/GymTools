<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Gym Tools Menu</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #bdbdbd;
      --btn-bg: #111;
      --btn-border: #333;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-right: max(14px, env(safe-area-inset-right));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      --safe-left: max(14px, env(safe-area-inset-left));
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      padding: calc(var(--safe-top) + 56px) var(--safe-right) calc(var(--safe-bottom) + 20px) var(--safe-left);
    }
    .topbar {
      position: fixed;
      top: var(--safe-top);
      left: var(--safe-left);
      right: var(--safe-right);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
      background: var(--bg);
    }
    .title {
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 700;
    }
    .small-btn {
      min-width: 86px;
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid var(--btn-border);
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--fg);
      font: inherit;
      font-size: clamp(16px, 1.8vw, 20px);
      cursor: pointer;
    }
    h2 {
      margin: 0 0 14px 0;
      font-size: clamp(24px, 3.2vw, 36px);
    }
    .section { margin-top: 18px; }
    .hint {
      color: var(--muted);
      margin: 0 0 18px 0;
      font-size: clamp(15px, 1.8vw, 18px);
    }
    .button-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .tool-btn {
      width: 100%;
      min-height: 74px;
      padding: 18px 20px;
      border: 1px solid var(--btn-border);
      border-radius: 18px;
      background: var(--btn-bg);
      color: var(--fg);
      font: inherit;
      font-size: clamp(22px, 3vw, 32px);
      text-align: center;
      cursor: pointer;
    }
    .status {
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      padding: 8px 2px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Gym Tools</div>
    <button class="small-btn" onclick="window.location.href='index.html'">Back</button>
  </div>

  <section class="section">
    <h2>Tools</h2>
    <p class="hint">Buttons are loaded from tools.json</p>
    <div id="tools" class="button-list"></div>
  </section>

  <section class="section">
    <h2>Split Screen</h2>
    <p class="hint">Buttons are loaded from combos.json</p>
    <div id="combos" class="button-list"></div>
  </section>

  <script>
    function createButton(label, url) {
      const btn = document.createElement('button');
      btn.className = 'tool-btn';
      btn.textContent = label;
      btn.onclick = () => { window.location.href = url; };
      return btn;
    }

    function showStatus(containerId, message) {
      const el = document.getElementById(containerId);
      const status = document.createElement('div');
      status.className = 'status';
      status.textContent = message;
      el.appendChild(status);
    }

    fetch('tools.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed');
        return res.json();
      })
      .then(data => {
        const container = document.getElementById('tools');
        data.forEach(item => container.appendChild(createButton(item.label, item.url)));
      })
      .catch(() => showStatus('tools', 'Failed to load tools.json'));

    fetch('combos.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed');
        return res.json();
      })
      .then(data => {
        const container = document.getElementById('combos');
        data.forEach(item => {
          const url = `split.html?left=${encodeURIComponent(item.left)}&right=${encodeURIComponent(item.right)}`;
          container.appendChild(createButton(item.label, url));
        });
      })
      .catch(() => showStatus('combos', 'Failed to load combos.json'));
  </script>
</body>
</html>
