<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Gym Tools Split</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --btn-bg: #111;
      --btn-border: #333;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-right: max(14px, env(safe-area-inset-right));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      --safe-left: max(14px, env(safe-area-inset-left));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 62px;
      padding: var(--safe-top) var(--safe-right) 10px var(--safe-left);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg);
      z-index: 5;
    }

    .title {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 700;
    }

    .small-btn {
      min-width: 86px;
      min-height: 44px;
      padding: 8px 14px;
      border: 1px solid var(--btn-border);
      border-radius: 16px;
      background: var(--btn-bg);
      color: var(--fg);
      font: inherit;
      cursor: pointer;
    }

    .frame-wrap {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    iframe {
      width: 50%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .error {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      font-size: clamp(20px, 3vw, 28px);
    }

    @media (max-width: 800px) {
      .frame-wrap { flex-direction: column; }
      iframe { width: 100%; height: 50%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Split Screen</div>
    <button class="small-btn" onclick="window.location.href='menu.html'">Back</button>
  </div>

  <div id="frames" class="frame-wrap">
    <iframe id="leftFrame" title="Left panel"></iframe>
    <iframe id="rightFrame" title="Right panel"></iframe>
  </div>

  <div id="error" class="error">Invalid split-screen parameters.</div>

  <script>
    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function isSafeLocalPage(value) {
      return typeof value === 'string'
        && /^[a-zA-Z0-9._-]+\.html$/.test(value)
        && !value.includes('..')
        && !value.includes('/')
        && !value.includes('\\');
    }

    const left = decodeURIComponent(getParam('left') || '');
    const right = decodeURIComponent(getParam('right') || '');

    if (isSafeLocalPage(left) && isSafeLocalPage(right)) {
      document.getElementById('leftFrame').src = left;
      document.getElementById('rightFrame').src = right;
    } else {
      document.getElementById('frames').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    }
  </script>
</body>
</html>
